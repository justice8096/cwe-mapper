name: Lint
on: [push, pull_request]
jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install flake8 && flake8 skills/cwe-mapper/scripts/ --max-line-length=120 --ignore=E501
